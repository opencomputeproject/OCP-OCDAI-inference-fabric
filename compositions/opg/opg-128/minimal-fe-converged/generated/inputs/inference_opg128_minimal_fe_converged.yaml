plan:
  name: Inference OPG-128 Minimal FE Converged
  status: draft
  description: >
    FE-only DIET translation of the OPG-128 minimal inference reference architecture.
    No backend fabric. Servers connect only to the converged frontend fabric via BF3 2x200G.
    Translation-note: backend omitted by design (RA defines no backend for this variant).

switch_classes:
  - switch_class_id: fe-leaf
    fabric_name: frontend
    fabric_class: managed
    hedgehog_role: server-leaf
    device_type_extension: ds5000_ext
    mclag_pair: false
    redundancy_type: mclag
    redundancy_group: fe-mclag
  - switch_class_id: fe-spine
    fabric_name: frontend
    fabric_class: managed
    hedgehog_role: spine
    device_type_extension: ds5000_ext
    uplink_ports_per_switch: 0
    mclag_pair: false

switch_port_zones:
  - switch_class: fe-leaf
    zone_name: fe-server-ports
    zone_type: server
    port_spec: 1-63:2
    breakout_option: b_4x200
    allocation_strategy: sequential
    priority: 10
  - switch_class: fe-leaf
    zone_name: fe-uplinks
    zone_type: uplink
    port_spec: 2-64:2
    breakout_option: b_1x800
    allocation_strategy: sequential
    priority: 20
  - switch_class: fe-spine
    zone_name: fe-fabric-downlinks
    zone_type: fabric
    port_spec: 1-64
    breakout_option: b_1x800
    allocation_strategy: sequential
    priority: 10

server_classes:
  - server_class_id: compute
    description: 16 inference compute servers, 8 xPUs each
    category: gpu
    quantity: 16
    gpus_per_server: 8
    server_device_type: gpu_server_fe_only_128

server_nics:
  - server_class: compute
    nic_id: fe
    module_type: nic_bf3_2x200

server_connections:
  - server_class: compute
    connection_id: fe
    connection_name: frontend
    nic: fe
    port_index: 0
    ports_per_connection: 2
    hedgehog_conn_type: unbundled
    distribution: alternating
    target_zone: fe-leaf/fe-server-ports
    speed: 200
    port_type: data

expected:
  counts:
    server_classes: 1
    switch_classes: 2
    connections: 1
